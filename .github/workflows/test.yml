name: Test monitor

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --requirement requirements.txt
      - run: python -m json.tool archuleta_red_flag_monitor/config.json >/dev/null
      - run: python -m py_compile archuleta_red_flag_monitor/monitor.py archuleta_red_flag_monitor/apply_model_review.py archuleta_red_flag_monitor/publish_github_pages.py
      - run: python -m unittest discover -s archuleta_red_flag_monitor/tests -v
